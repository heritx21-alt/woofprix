name: Scraping nocturne WoofPrix

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Installer les dépendances
        run: pip install -r scripts/requirements.txt

      - name: Tester les URL de recherche
        run: python scripts/test_search_urls.py

      - name: Analyser le HTML des pages de recherche
        run: python scripts/debug_selectors.py

      - name: Lancer le scraping
        run: python scripts/scrape_all.py

      - name: Vérifier le JSON
        run: python -c "import json; data = json.load(open('public/data/products.json')); print(f'✓ {len(data)} produits scrapés')"

      - name: Commit & Push
        run: |
          git config user.name "woofprix-bot"
          git config user.email "bot@woofprix.fr"
          git add public/data/ html_samples/
          if git diff --quiet && git diff --staged --quiet; then
            echo "Aucun changement — pas de commit"
          else
            git commit -m "🔄 Mise à jour automatique des prix ($(date +'%d/%m/%Y'))"
            git push
          fi

      - name: Déclencher le redéploiement Vercel
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        if: env.VERCEL_DEPLOY_HOOK != ''
        run: |
          curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
          echo "✓ Redéploiement Vercel déclenché"

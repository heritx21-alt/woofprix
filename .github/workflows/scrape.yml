name: Scraping nocturne WoofPrix

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

concurrency:
  group: scrape
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Installer les dépendances
        run: pip install -r scripts/requirements.txt

      - name: Installer Playwright (navigateur headless)
        run: |
          pip install playwright
          playwright install chromium
        if: always()

      - name: Lancer le scraping
        run: python scripts/scrape_all.py

      - name: Vérifier le JSON
        run: python -c "import json; d = json.load(open('public/data/products.json')); print(f'✓ {d[\"total_products\"]} produits, {sum(1 for p in d[\"products\"] for pp in p[\"prices\"] if pp.get(\"source\")==\"scraped\")} prix scrapés')"

      - name: Commit & Push
        run: |
          git config user.name "woofprix-bot"
          git config user.email "bot@woofprix.fr"
          git add public/data/
          if git diff --quiet && git diff --staged --quiet; then
            echo "Aucun changement — pas de commit"
          else
            git commit -m "🔄 Mise à jour automatique des prix ($(date +'%d/%m/%Y'))"
            git push
          fi

      - name: Déclencher le redéploiement Vercel
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        if: env.VERCEL_DEPLOY_HOOK != ''
        run: |
          curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
          echo "✓ Redéploiement Vercel déclenché"
